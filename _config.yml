description: >-
  Philosophical fragments...

# 3. Gem settings
paginate: 2
paginate_path: blog/page:num
author: Zakariya Tanweer

# 4. Jekyll settings
sass:
  style: compressed
permalink: pretty
excerpt_separator: <!-- more -->
timezone: Europe/London

# 5. Collections
collections:
  posts:
    title: Diapsalmata
    output: true
    description: ""
    feature_text: |

# 6. Defaults
defaults:
  -
    scope:
      path: ""
    values:
      image: "/assets/Header.png"
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: post

# 7. Site settings
encoding: utf-8
lang: en-GB
